[build]
  publish = "web"
  functions = "netlify/functions"

[functions]
  included_files = ["recipes/claude/**", "recipes/raw-html/**/*.html"]

[[redirects]]
  from = "/api/recipes"
  to = "/.netlify/functions/recipes"
  status = 200

[[redirects]]
  from = "/api/recipe-states"
  to = "/.netlify/functions/recipe-states"
  status = 200

[[redirects]]
  from = "/api/recipe-state"
  to = "/.netlify/functions/recipe-state"
  status = 200

[[redirects]]
  from = "/api/recipe-edit"
  to = "/.netlify/functions/recipe-edit"
  status = 200

[[redirects]]
  from = "/api/shopping-list"
  to = "/.netlify/functions/shopping-list"
  status = 200

[[redirects]]
  from = "/mealime/*"
  to = "/.netlify/functions/mealime-recipe/:splat"
  status = 200

[[redirects]]
  from = "/recipes/*"
  to = "/index.html"
  status = 200
